  <text x="32" y="178" class="tick">30%</text>
  <text x="32" y="126" class="tick">40%</text>
  <text x="32" y="74" class="tick">50%</text>
  <rect x="118" y="278" width="86" height="52" fill="#7aa6c2"/>
  <rect x="257" y="226" width="86" height="104" fill="#4f83b3"/>
  <rect x="396" y="320" width="86" height="10" fill="#c96f5f"/>
  <rect x="535" y="216" width="86" height="114" fill="#8ab17d"/>
  <rect x="674" y="80" width="86" height="250" fill="#3f8f5f"/>
