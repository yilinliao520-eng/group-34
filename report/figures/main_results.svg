  <line x1="70" y1="278" x2="830" y2="278" class="grid"/>
  <line x1="70" y1="226" x2="830" y2="226" class="grid"/>
  <line x1="70" y1="174" x2="830" y2="174" class="grid"/>
  <line x1="70" y1="122" x2="830" y2="122" class="grid"/>
  <line x1="70" y1="70" x2="830" y2="70" class="grid"/>
  <text x="38" y="334" class="tick">0%</text>
  <text x="32" y="282" class="tick">10%</text>
