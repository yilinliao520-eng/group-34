  <line x1="70" y1="72" x2="70" y2="282" class="axis"/>
  <line x1="70" y1="240" x2="660" y2="240" class="grid"/>
  <line x1="70" y1="198" x2="660" y2="198" class="grid"/>
  <line x1="70" y1="156" x2="660" y2="156" class="grid"/>
  <line x1="70" y1="114" x2="660" y2="114" class="grid"/>
  <line x1="70" y1="72" x2="660" y2="72" class="grid"/>
  <text x="38" y="286" class="tick">0%</text>
  <text x="32" y="244" class="tick">10%</text>
  <text x="32" y="202" class="tick">20%</text>
  <text x="32" y="160" class="tick">30%</text>
  <text x="32" y="118" class="tick">40%</text>
  <text x="32" y="76" class="tick">50%</text>
  <rect x="103" y="274" width="58" height="8" fill="#b91c1c"/>
  <rect x="206" y="190" width="58" height="92" fill="#6b7280"/>
  <rect x="309" y="190" width="58" height="92" fill="#6b7280"/>
  <rect x="412" y="80" width="58" height="202" fill="#111827"/>
  <rect x="515" y="80" width="58" height="202" fill="#4b5563"/>
  <text x="126" y="268" class="value">2%</text>
  <text x="226" y="184" class="value">22%</text>
  <text x="329" y="184" class="value">22%</text>
  <text x="432" y="74" class="value">48%</text>
  <text x="535" y="74" class="value">48%</text>
  <text x="87" y="306" class="label">No ctrl.</text>
  <text x="180" y="306" class="label">Repeat-click</text>
  <text x="293" y="306" class="label">No buy</text>
  <text x="388" y="306" class="label">Conservative</text>
  <text x="502" y="306" class="label">Aggressive</text>
