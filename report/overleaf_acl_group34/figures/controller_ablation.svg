<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <rect width="720" height="360" fill="#ffffff"/>
  <style>
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
    .axis { stroke: #111827; stroke-width: 1.2; }
    .grid { stroke: #d1d5db; stroke-width: 0.8; }
    .tick { font-family: Arial, sans-serif; font-size: 12px; fill: #374151; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #111827; }
    .value { font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #111827; }
    .note { font-family: Arial, sans-serif; font-size: 12px; fill: #374151; }
  </style>
  <text x="54" y="36" class="title">Controller Ablation on Unified SFT</text>
