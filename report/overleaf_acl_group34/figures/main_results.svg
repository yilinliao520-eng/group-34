<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <rect width="720" height="360" fill="#ffffff"/>
  <style>
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
    .axis { stroke: #111827; stroke-width: 1.2; }
    .grid { stroke: #d1d5db; stroke-width: 0.8; }
    .tick { font-family: Arial, sans-serif; font-size: 12px; fill: #374151; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #111827; }
    .value { font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #111827; }
    .note { font-family: Arial, sans-serif; font-size: 12px; fill: #374151; }
  </style>
  <text x="54" y="36" class="title">Strong Success Rate by System</text>
  <line x1="70" y1="282" x2="660" y2="282" class="axis"/>
  <line x1="70" y1="72" x2="70" y2="282" class="axis"/>
  <line x1="70" y1="240" x2="660" y2="240" class="grid"/>
  <line x1="70" y1="198" x2="660" y2="198" class="grid"/>
  <line x1="70" y1="156" x2="660" y2="156" class="grid"/>
  <line x1="70" y1="114" x2="660" y2="114" class="grid"/>
  <line x1="70" y1="72" x2="660" y2="72" class="grid"/>
  <text x="38" y="286" class="tick">0%</text>
  <text x="32" y="244" class="tick">10%</text>
  <text x="32" y="202" class="tick">20%</text>
  <text x="32" y="160" class="tick">30%</text>
  <text x="32" y="118" class="tick">40%</text>
  <text x="32" y="76" class="tick">50%</text>
  <rect x="112" y="240" width="70" height="42" fill="#9ca3af"/>
  <rect x="238" y="198" width="70" height="84" fill="#6b7280"/>
  <rect x="364" y="274" width="70" height="8" fill="#b91c1c"/>
  <rect x="490" y="80" width="70" height="202" fill="#111827"/>
  <text x="136" y="234" class="value">10%</text>
  <text x="262" y="192" class="value">20%</text>
  <text x="391" y="268" class="value">2%</text>
  <text x="514" y="74" class="value">48%</text>
  <text x="101" y="306" class="label">Raw ReAct</text>
  <text x="211" y="306" class="label">Keyword baseline</text>
  <text x="350" y="306" class="label">Unified SFT</text>
  <text x="456" y="306" class="label">SFT + controller</text>
  <text x="70" y="336" class="note">SFT alone hurts transition control; conservative control recovers progress from search to click and buy.</text>
</svg>
